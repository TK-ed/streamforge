apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: streamforge
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.streamforge:9090
        isDefault: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.streamforge:3100

      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger.streamforge:16686
