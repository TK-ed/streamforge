apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: streamforge

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:

      - job_name: "streamforge-api"
        metrics_path: /metrics

        static_configs:
          - targets:
              - streamforge-api:80

      - job_name: "rabbitmq"
        static_configs:
          - targets:
              - rabbitmq:15692
