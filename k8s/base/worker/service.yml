apiVersion: v1
kind: Service

metadata:
  name: streamforge-worker
  namespace: streamforge
  labels:
    app: streamforge-worker

spec:
  # The worker is not load-balanced traffic — this Service exists so Prometheus
  # can reach the prometheus_client metrics endpoint (start_http_server(8001)).
  selector:
    app: streamforge-worker

  ports:
    - name: metrics
      port: 8001
      targetPort: 8001

  type: ClusterIP
