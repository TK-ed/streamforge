apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-api-ingress
  namespace: streamforge
  annotations:
    # HLS segments can be large; don't cap the proxied body size.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx

  rules:
    # S3 API (port 9000) — used by players (VLC) to fetch HLS playlists/segments.
    - host: minio-api.streamforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
