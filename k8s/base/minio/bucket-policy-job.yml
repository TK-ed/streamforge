apiVersion: batch/v1
kind: Job
metadata:
  name: minio-set-public
  namespace: streamforge
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc
          # Make the bucket anonymously downloadable so a player (VLC) can fetch
          # the HLS playlist + .ts segments without credentials. Mirrors the
          # docker-compose `minio-init` service.
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 admin password123; do
                echo "waiting for minio..."; sleep 3;
              done
              mc anonymous set download local/streamforge
              mc anonymous get local/streamforge
