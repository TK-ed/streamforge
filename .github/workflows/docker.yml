name: Docker Build Check

on:
  push:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api_gateway/Dockerfile
          tags: api-gateway:ci
          push: false
          load: true
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,scope=api-gateway,mode=max

      - name: Build Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workers/Dockerfile
          tags: worker:ci
          push: false
          load: true
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Validate docker-compose
        # -q fails on an invalid/missing compose file instead of silently passing.
        run: docker compose config -q
