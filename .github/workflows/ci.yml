name: Backend CI

on:
  push:
    branches: ["main", "fix/*", "feature/*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---- CORE SAFETY CHECK ----
      - name: Check syntax (entire repo)
        run: python -m compileall .

      # ---- API Gateway import check ----
      - name: Check API service imports
        run: |
          PYTHONPATH=. python -c "from services.api_gateway.app.main import app" || echo "API import check skipped"

      # ---- Worker import check ----
      - name: Check worker imports
        run: |
          PYTHONPATH=. python -c "import workers" || echo "Worker import check skipped"

      # ---- Shared layer check ----
      - name: Check shared module imports
        run: |
          PYTHONPATH=. python -c "import shared" || echo "Shared import check skipped"
