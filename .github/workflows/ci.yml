name: Backend CI

on:
  push:
  pull_request:
    branches: ["main"]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match the runtime images (python:3.12-slim).
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            services/api_gateway/requirements.txt
            workers/requirements.txt
            loadtest/requirements.txt

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort "bandit[toml]" pip-audit

      # -------------------------
      # 1. Code Quality Checks
      # -------------------------
      - name: Lint (flake8)
        run: flake8 services shared workers

      - name: Format check (black)
        run: black --check services shared workers

      - name: Import sorting (isort check)
        run: isort services shared workers --check-only

      # -------------------------
      # 2. Security Checks
      # -------------------------
      - name: Security scan (bandit)
        run: bandit -r services shared workers -c pyproject.toml

      - name: Dependency audit (pip-audit)
        # Advisory: surfaces known CVEs in dependencies without blocking the
        # build, since transitive fixes aren't always immediately available.
        continue-on-error: true
        run: |
          pip-audit \
            -r services/api_gateway/requirements.txt \
            -r workers/requirements.txt \
            -r loadtest/requirements.txt

      # -------------------------
      # 3. Basic compilation safety
      # -------------------------
      - name: Python compile check
        run: python -m compileall services shared workers
