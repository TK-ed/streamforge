services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: streamforge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d streamforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    volumes:
      - .:/app
    working_dir: /app/workers
    environment:
      PYTHONPATH: /app
    depends_on:
      rabbitmq:
        condition: service_healthy

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    tty: true

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local ${MINIO_ENDPOINT} ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc anonymous set download local/${BUCKET_NAME};
      mc anonymous get local/${BUCKET_NAME};
      "

  migrate:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    volumes:
      - .:/app
    command: alembic upgrade head

    environment:
      PYTHONPATH: /app

    depends_on:
      postgres:
        condition: service_healthy

  api:
    env_file:
      - ./services/api_gateway/.env
    working_dir: /app/services/api_gateway
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio

volumes:
  minio_data:
